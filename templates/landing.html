<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Delivery App</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    height:100vh;
    color:white;
    background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') no-repeat center center/cover;
    position:relative;
}

/* dark overlay for professional look */
body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

header{
    position:relative;
    z-index:2;
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
}

.logo{
    font-size:22px;
    font-weight:600;
}

nav a{
    margin-left:20px;
    text-decoration:none;
    color:white;
}

.hero{
    position:relative;
    z-index:2;
    height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.hero h1{
    font-size:45px;
    margin-bottom:15px;
}

.hero p{
    font-size:18px;
    margin-bottom:25px;
    max-width:500px;
}

.btn{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#ff7e5f;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.08);
    background:#ff5722;
}

</style>
</head>

<body>

<header>
    <div class="logo">🚀 DeliveryAI</div>
    <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/predict_page">Predict</a>
    </nav>
</header>

<section class="hero">
    <h1>Fast & Smart Delivery Prediction</h1>
    <p>Predict your food delivery time with AI and real-time maps accuracy</p>
    <a href="/predict_page">
        <button class="btn">Start Prediction</button>
    </a>
</section>

</body>
</html>
